<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>رسالة جميلة ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{
    overflow:hidden;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0ff);
    height:100vh;
    color:white;
}

/* الصفحات */

.page{
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
    transition:1s;
}

/* الصفحة الأولى */

#page1{
    z-index:2;
}

#page1 h1{
    font-size:42px;
    text-align:center;
    margin-bottom:30px;
    text-shadow:0 0 15px rgba(255,255,255,.5);
}

.open-btn{
    padding:15px 40px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4f81;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:.4s;
    box-shadow:0 0 20px rgba(255,255,255,.4);
}

.open-btn:hover{
    transform:scale(1.1);
}

/* الصفحة الثانية */

#page2{
    opacity:0;
    pointer-events:none;
    text-align:center;
}

#page2.active{
    opacity:1;
    pointer-events:auto;
}

.photo{
    width:220px;
    height:220px;
    border-radius:60%;
    overflow:hidden;
    border:6px solid white;
    box-shadow:0 0 30px rgba(255,255,255,.6);
    margin-bottom:25px;
    animation:float 4s ease-in-out infinite;
}

.photo img{
    width:120%;
    height:120%;
    object-fit:cover;
}

.message{
    width:100%;
    max-width:750px;
    font-size:22px;
    line-height:2.2;
    font-weight:700;
    padding:15px;
    overflow-y:auto;
    max-height:60vh;
}

/* القلوب */

.hearts span{
    position:absolute;
    bottom:-50px;
    color:white;
    animation:hearts linear infinite;
    opacity:.8;
}

@keyframes hearts{
    0%{
        transform:translateY(0) rotate(0deg);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-15px);
    }
}

/* الموبايل */

@media(max-width:600px){

    body{
        overflow:auto;
    }

    #page1 h1{
        font-size:30px;
    }

    .photo{
        width:170px;
        height:170px;
    }

    .message{
        font-size:18px;
        line-height:2;
        max-height:58vh;
    }

}

</style>
</head>

<body>

<div class="hearts"></div>

<!-- الصفحة الأولى -->

<div class="page" id="page1">

    <h1>
        ❤️ love you my best friend ❤️
    </h1>

    <button class="open-btn" onclick="openGift()">
        open message✨
    </button>

</div>

<!-- الصفحة الثانية -->

<div class="page" id="page2">

    <div class="photo">
        <img src="jeese.jpeg">
    </div>

    <div class="message" id="text"></div>

</div>

<!-- الأغنية -->

<audio id="song" loop>
    <source src="jojyy.mpeg" type="audio/mp3">
</audio>

<script>

const message = `

في ناس وجودها في حياتنا بيكون عادي...
وفي ناس وجودهم لوحده أمان وراحة ❤️

وإنتِ من الناس اللي وجودهم فرق معايا بجد...

إنتِ مش بس شخص قريب مني،
إنتِ صديقتي اللي بحكيلها كل حاجة،
وأختي اللي بخاف عليها من أي زعل ✨

وعارف قد إيه الفترة دي صعبة عليكي،
وقد إيه الثانوية العامة ضغط وتعب وتفكير طول الوقت...
بس بجد أنا فخور بيكي جدًا ❤️

فخور إنك بتحاولي،
وبتتعبي،
وبتكملي حتى وإنتِ مضغوطة ✨

ومهما حسيتي إنك تعبانة،
أو إن الدنيا تقيلة،
افتكري إنك قوية وقدها ❤️

إنتِ مش محتاجة تثبتي لحد إنك شاطرة،
مجرد إنك لسه بتحاولي كل يوم فده لوحده إنجاز كبير ✨

وبجد أنا مؤمن بيكي جدًا،
ومؤمن إن تعبك مش هيروح هدر ❤️

يمكن في أيام تحسي إنك زهقانة،
أو إنك مش قادرة تكملي،
بس صدقيني كل خطوة صغيرة بتعمليها دلوقتي،
هتقربك من حلمك أكتر ✨

وحتى لو الدنيا كانت صعبة،
إنتِ طول عمرك أقوى من أي ضغط ❤️

كل مرة أكلمك فيها،
بحس براحة غريبة كأن الدنيا بقت أخف شوية ❤️

وكل مرة تضحكي،
بحس إن في حاجة حلوة حصلت في يومي ✨

إنتِ من الناس القليلة اللي وجودهم لوحده يفرق،
واللي مجرد الكلام معاهم يطمن القلب ❤️

ولما تحسي إنك مش قادرة،
افتكري إن كل تعب النهارده هيبقى نجاح وفرحة كبيرة بكرة ❤️

وإني دايمًا موجود علشانك،
أسمعك،
وأهون عليكي،
وأفكرك قد إيه إنتِ شخص جميل وقوي ✨

مهما الدنيا كانت زحمة،
وجودك بيخلي كل حاجة أهدى وأحلى ❤️

وخليكي دايمًا فاكرة إنك تستحقي كل خير،
وإن الأيام الحلوة جاية ليكي بإذن الله ✨

وبجد…
أنا مبسوط إنك موجودة في حياتي ❤️

`;

function openGift(){

    document.getElementById("page1").style.opacity = "0";
    document.getElementById("page1").style.pointerEvents = "none";

    document.getElementById("page2").classList.add("active");

    const song = document.getElementById("song");

    song.play();

    let i = 0;

    function typeWriter(){

        if(i < message.length){

            document.getElementById("text").innerHTML += message.charAt(i);

            i++;

            setTimeout(typeWriter,40);

            document.querySelector(".message").scrollTop =
            document.querySelector(".message").scrollHeight;

        }

    }

    typeWriter();

}

/* القلوب */

const hearts = document.querySelector(".hearts");

for(let i=0;i<45;i++){

    let heart = document.createElement("span");

    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*100 + "vw";

    heart.style.fontSize = (Math.random()*25+15) + "px";

    heart.style.animationDuration = (Math.random()*5+5) + "s";

    hearts.appendChild(heart);

}

</script>

</body>
</html>
